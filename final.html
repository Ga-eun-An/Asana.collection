<!DOCTYPE html>
<html lang="ko">

<head>

<title>Asana Collection</title>
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

    <link rel="stylesheet"
        href="final_style.css">

</head>

<body>

    <div class="main-container">

        <div class="list-section"
            id="asana-list">
        </div>

        <img id="info-image"
            src=""
            alt="Asana Preview"
            style="display: none;">

        <div class="divider">
        </div>

        <div class="detail-section">

            <div id="asana-info"
                class="info-box">
            </div>

            <div id="info-story"
                class="story-text">
            </div>

        </div>

    </div>


    <!-- PDF 버튼 -->
    <button id="pdf-btn">

        Download to PDF

    </button>


    <!-- 인쇄 전용 레이어 -->
    <div id="print-container">

    </div>


    <!-- 커스텀 커서 -->
    <div id="custom-cursor">

    </div>


    <script src="final_script.js">

    </script>
    

</body>

</html>
